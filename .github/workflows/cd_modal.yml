name: CD — Deploy to Modal (FastAPI backend)

# Only deploy tagged releases to Modal (e.g. git tag v1.0.0 && git push --tags)
on:
  push:
    tags:
      - "v*"          # Triggers on v1.0.0, v1.2.3, etc.
  workflow_dispatch:  # Also allows manual trigger from GitHub Actions UI

jobs:
  deploy-to-modal:
    name: Deploy FastAPI to Modal
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Modal
        run: pip install modal

      # SETUP REQUIRED:
      #   1. Run `modal token new` locally to get your token
      #   2. Add to GitHub Secrets:
      #      - MODAL_TOKEN_ID
      #      - MODAL_TOKEN_SECRET
      - name: Deploy to Modal
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
        run: |
          modal deploy deploy/modal_app.py
          echo "✅ Deployed to Modal"
